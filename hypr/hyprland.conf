###################
###LOOK AND FEEL###
###################

general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    float_gaps = 3
    gaps_workspaces = 2
    col.active_border = 0xff4c566a
    col.inactive_border = 0xff2e3440
    col.nogroup_border = 0xff000000
    col.nogroup_border_active = 0xff4c566a
    layout = dwindle
    no_focus_fallback = false
    resize_on_border = true
    extend_border_grab_area = 10
    hover_icon_on_border = true
    allow_tearing = false
    resize_corner = 0
    modal_parent_blocking = true
    locale = en_GB.UTF-8
    snap {
        enabled = true
	window_gap = 5
	monitor_gap = 10
	border_overlap = true
	respect_gaps = true
    }
}
decoration { 
    rounding = 4
    rounding_power = 5.0
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0
    dim_modal = true
    dim_inactive = true
    dim_strength = 0.25
    dim_special = 0.25
    dim_around = 0.25
    border_part_of_window = true
    blur {
    	enabled = true
        size = 4
        passes = 1
        xray = false
        noise = 0.02
        brightness = 1.0
    }
    shadow { 
        enabled = false
    }   
}
animations {
    enabled = true
    workspace_wraparound = false
}
input {
    kb_layout = gb
}
misc {
    font_family = JetBrainsMono Nerd Font
}

###########
###BINDS###
###########
source = ~/data/.config/hypr/binds.conf

##############
###MONITORS###
##############
source = ~/data/.config/hypr/monitors.conf

###############
###AUTOSTART###
###############
source = $HOME/data/.config/hypr/autostart.conf
