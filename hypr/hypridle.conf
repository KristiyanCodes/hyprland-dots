general {
    lock_cmd = pidof hyprlock || hyprlock
    on_lock_cmd = notify-send "you are idle" "starting hyprlock" && nmcli radio wifi off && playerctl pause
    on_unlock_cmd = notify-send "welcome back" "you may continue your work" && nmcli radio wifi on && playerctl play
}

listener {
    timeout = 300
    on-timeout = hyprlock
    on-resume = notify-send "welcome back" "you may continue your work"
}

listener {
    timeout = 600
    on-timeout = brightnessctl set 5%
    on-resume = brightnessctl set 15%
}

listener {
    timeout = 1200
    on-timeout = systemctl suspend
}
